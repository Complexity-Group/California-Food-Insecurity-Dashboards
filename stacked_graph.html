<div class="fi-stacked-card">
  <div class="fi-stacked-panel">
    <canvas id="fiStackedChart"></canvas>
  </div>

  <div id="fi-year-labels" class="fi-year-labels"></div>

  <div class="fi-stacked-ylabel">Persons (in million)</div>
</div>

<style>
  .fi-stacked-card{
    position:relative;
    background: transparent;
    max-width:650px;
    margin:0 auto;
    padding:0 18px 18px;
    border-radius:6px;
    font-family:Arial, Helvetica, sans-serif;
  }

  .fi-stacked-panel{
    height:290px; 
    padding:0 36px;
  }

  .fi-year-labels{
    display:flex;
    justify-content:space-between;
    margin-top:6px;
    padding:0 36px;
    font-size:12px;
    color:#000;
    font-family:Arial, Helvetica, sans-serif;
    line-height:1;
  }

  .fi-year-label{
    text-align:center;
    flex:1;
  }

  .fi-stacked-ylabel{
    position:absolute;
    left:6px;
    top:64%;
    transform:translateY(-50%) rotate(-90deg);
    transform-origin:left top;
    font-size:14px;
    color:#000;
    pointer-events:none;
    font-family:Arial, Helvetica, sans-serif;
  }

  .fi-stacked-card canvas{
    width:100% !important;
    height:100% !important;
    display:block;
  }

  @media (max-width:768px){
    .fi-stacked-card{ max-width:100%; }
    .fi-stacked-panel{
      height:250px;
      padding:0 10px;
    }
    .fi-year-labels{
      padding:0 10px;
      font-size:11px;
      margin-top:4px;
    }
    .fi-stacked-ylabel{
      font-size:12px;
      left:2px;
      top:64%;
    }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
(() => {
  const STACKED_CSV_URL =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbEjf2GzChSgrtkUHaj1BwOEkDdCGzmGNl4aPxs-Gq7JBPSwRxf7I1zYMKRltGsg/pub?gid=983300747&single=true&output=csv";

  const STACKED_COL = {
    date: "date",
    often: "often_not_enough_millions",
    sometimes: "sometimes_not_enough_millions"
  };

  async function stackedFetchCsv(url){
    const res = await fetch(url, { cache: "no-store" });
    if(!res.ok) throw new Error("Failed to fetch CSV");
    return res.text();
  }

  function stackedParseCsv(text){
    const lines = text.trim().split(/\r?\n/);
    const headers = lines[0].split(",").map(h => h.trim());
    const idx = n => headers.indexOf(n);

    const num = v => {
      const cleaned = String(v ?? "").trim();
      return cleaned !== "" && cleaned !== "#N/A" && !isNaN(cleaned) ? +cleaned : null;
    };

    const rows = [];
    for(let i = 1; i < lines.length; i++){
      const p = lines[i].split(",");
      const d = p[idx(STACKED_COL.date)];
      if(!d) continue;

      rows.push({
        date: d.trim(),
        often: num(p[idx(STACKED_COL.often)]),
        sometimes: num(p[idx(STACKED_COL.sometimes)])
      });
    }

    rows.sort((a, b) => a.date.localeCompare(b.date));
    return rows;
  }

  function stackedFmtMonthOnly(iso){
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleString("en-US", { month: "short" });
  }

  function getYearGroups(labels){
    if(!labels.length) return [];

    const groups = [];
    let currentYear = new Date(labels[0] + "T00:00:00").getFullYear();
    let count = 0;

    labels.forEach((d) => {
      const y = new Date(d + "T00:00:00").getFullYear();
      if(y === currentYear){
        count++;
      } else {
        groups.push({ year: currentYear, count });
        currentYear = y;
        count = 1;
      }
    });

    groups.push({ year: currentYear, count });
    return groups;
  }

  function renderYearLabels(labels){
    const container = document.getElementById("fi-year-labels");
    if(!container) return;

    container.innerHTML = "";

    const groups = getYearGroups(labels);

    groups.forEach(g => {
      const div = document.createElement("div");
      div.className = "fi-year-label";
      div.style.flex = g.count;
      div.textContent = g.year;
      container.appendChild(div);
    });
  }

  function stackedBaseOptions(){
    const isMobile = window.matchMedia("(max-width: 768px)").matches;

    return {
      responsive: true,
      maintainAspectRatio: false,
      layout: {
        padding: {
          top: 18,
          right: 8,
          bottom: 10,
          left: 8
        }
      },
      plugins: {
        legend: { display: false },
        title: {
          display: false,
          text: "Often + Sometimes not enough",
          color: "#000",
          align: "center",
          padding: {
            top: 4,
            bottom: 12
          },
          font: {
            size: isMobile ? 14 : 18,
            family: "Arial, Helvetica, sans-serif",
            weight: "normal"
          }
        }
      },
      elements: {
        line: { tension: 0.15, borderWidth: 0 },
        point: { radius: 0 }
      },
      scales: {
        x: {
          stacked: true,
          grid: { display: false },
          ticks: {
            font: { size: isMobile ? 11 : 13 },
            autoSkip: false,
            maxRotation: isMobile ? 35 : 0,
            minRotation: isMobile ? 35 : 0,
            padding: 6,
            color: "#000"
          },
          border: { color: "#000", width: 1.5 }
        },
        y: {
          stacked: true,
          min: 0,
          max: 4,
          ticks: {
            stepSize: 1,
            font: { size: isMobile ? 11 : 12 },
            padding: 6,
            color: "#000"
          },
          grid: { display: false },
          border: { color: "#000", width: 1.5 }
        }
      }
    };
  }

  let stackedChartInstance = null;

  async function stackedBuildChart(){
    const rows = stackedParseCsv(await stackedFetchCsv(STACKED_CSV_URL));
    const labels = rows.map(r => r.date);
    const often = rows.map(r => r.often);
    const sometimes = rows.map(r => r.sometimes);

    renderYearLabels(labels);

    const canvas = document.getElementById("fiStackedChart");
    if(!canvas) return;

    if(stackedChartInstance) stackedChartInstance.destroy();

    const baseOptions = stackedBaseOptions();

    stackedChartInstance = new Chart(canvas, {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "Sometimes not enough",
            data: sometimes,
            fill: true,
            backgroundColor: "#ff3b0a",
            borderColor: "#ff3b0a",
            borderWidth: 0,
            order: 1
          },
          {
            label: "Often not enough",
            data: often,
            fill: "-1",
            backgroundColor: "#8b0000",
            borderColor: "#8b0000",
            borderWidth: 0,
            order: 2
          }
        ]
      },
      options: {
        ...baseOptions,
        scales: {
          ...baseOptions.scales,
          x: {
            ...baseOptions.scales.x,
            ticks: {
              ...baseOptions.scales.x.ticks,
              callback: (value, index) => stackedFmtMonthOnly(labels[index] || "")
            }
          }
        }
      }
    });
  }

  let stackedResizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(stackedResizeTimer);
    stackedResizeTimer = setTimeout(() => {
      stackedBuildChart().catch(console.error);
    }, 200);
  });

  stackedBuildChart().catch(console.error);
})();
</script>
